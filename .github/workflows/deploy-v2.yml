name: Deploy Redesign to v2

on:
  push:
    branches: [astro-redesign] # Only run on the redesign branch
  workflow_dispatch:

permissions:
  contents: write # Needed to push to gh-pages branch
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          uv sync
          npm install

      - name: Fetch Data from Airtable
        run: uv run fetch_data.py
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}

      - name: Build Astro
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Deploy to v2 Subfolder
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Astro builds into
          target-folder: v2 # The subfolder on gh-pages branch
          branch: gh-pages
          clean: false # VERY IMPORTANT: Do not delete existing files in gh-pages
