name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Process all records from Airtable (ignoring status)'
        type: boolean
        default: false

permissions:
  contents: write # Needed to push to gh-pages branch
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          uv sync
          npm install

      - name: Fetch Data from Airtable
        run: |
          if [[ "${{ github.event.inputs.full_refresh }}" == "true" ]]; then
            uv run fetch_data.py --full-refresh
          else
            uv run fetch_data.py
          fi
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}

      - name: Build Astro
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Astro builds into
          branch: gh-pages
          clean: true # Enable cleaning existing files in gh-pages
